<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat & File Share (Online/Offline)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #075e54; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        
        /* Connection Panel */
        .connection-panel { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .step { background: white; padding: 10px; border-radius: 5px; border: 1px solid #e0e0e0; }
        .step h3 { font-size: 0.9rem; color: #128c7e; margin-bottom: 5px; }
        textarea { width: 100%; height: 50px; font-size: 0.8rem; padding: 5px; resize: none; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { display: flex; gap: 5px; margin-top: 5px; }
        button { background-color: #128c7e; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        button:hover { background-color: #075e54; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #e5ddd5; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg.local { align-self: flex-end; background-color: #d9fdd3; }
        .msg.remote { align-self: flex-start; background-color: white; }
        .msg.system { align-self: center; background-color: rgba(0,0,0,0.05); font-size: 0.8rem; color: #555; border-radius: 4px; }
        
        /* Input Area */
        .input-panel { padding: 10px; background: #f0f0f0; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #textInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .file-label { background: #007bff; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .file-label:hover { background: #0056b3; }
        #fileInput { display: none; }
        
        /* Progress Bar */
        #progressContainer { display: none; padding: 5px 15px; background: #eee; font-size: 0.8rem; }
        #progressBar { width: 100%; height: 8px; background: #ccc; border-radius: 4px; overflow: hidden; margin-top: 3px; }
        #progressFill { width: 0%; height: 100%; background: #25d366; transition: width 0.1s; }
    </style>
</head>
<body>

<header>P2P Offline/Online Share & Chat</header>

<div class="container">
    <!-- Panel Sambungan Manual untuk Hotspot/Offline -->
    <div class="connection-panel" id="connectionPanel">
        <div class="step">
            <h3>LANGKAH 1 (User A): Buat Room</h3>
            <button id="btnInit">Generate Kode Room</button>
            <textarea id="localOffer" readonly placeholder="Kode Anda akan muncul di sini..."></textarea>
            <button id="btnCopyOffer" disabled>Salin Kode Anda</button>
        </div>
        
        <div class="step">
            <h3>LANGKAH 2 (User B): Tempel Kode & Sambungkan</h3>
            <textarea id="remoteOffer" placeholder="Tempel kode dari teman Anda di sini..."></textarea>
            <div class="btn-group">
                <button id="btnAcceptOffer">Hubungkan sebagai Penerima</button>
                <button id="btnFinalize" style="display:none; background-color:#ff9800;">Selesaikan Koneksi (User A)</button>
            </div>
        </div>
    </div>

    <!-- Progress Transfer File -->
    <div id="progressContainer">
        <span id="progressText">Mengirim file... 0%</span>
        <div id="progressBar"><div id="progressFill"></div></div>
    </div>

    <!-- Area Chat -->
    <div class="chat-area">
        <div class="messages" id="messagesBox">
            <div class="msg system">Belum terhubung. Jalankan langkah di atas menggunakan hotspot yang sama.</div>
        </div>
        
        <div class="input-panel">
            <label class="file-label" for="fileInput">📎 File</label>
            <input type="file" id="fileInput" disabled />
            <input type="text" id="textInput" placeholder="Ketik pesan di sini..." disabled autocomplete="off" />
            <button id="btnSend" disabled>Kirim</button>
        </div>
    </div>
</div>

<script>
    // Konfigurasi WebRTC tanpa STUN/TURN server eksternal agar 100% aman saat offline total
    const configuration = { iceServers: [] };
    let pc = new RTCPeerConnection(configuration);
    let dataChannel = null;
    let receiveBuffer = [];
    let receivedSize = 0;
    let incomingFileInfo = null;

    // Elemen DOM
    const btnInit = document.getElementById('btnInit');
    const localOffer = document.getElementById('localOffer');
    const btnCopyOffer = document.getElementById('btnCopyOffer');
    const remoteOffer = document.getElementById('remoteOffer');
    const btnAcceptOffer = document.getElementById('btnAcceptOffer');
    const btnFinalize = document.getElementById('btnFinalize');
    const messagesBox = document.getElementById('messagesBox');
    const textInput = document.getElementById('textInput');
    const fileInput = document.getElementById('fileInput');
    const btnSend = document.getElementById('btnSend');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    // 1. Alur USER A (Membuat Penawaran / Host)
    btnInit.onclick = async () => {
        dataChannel = pc.createDataChannel("chat-file-channel");
        setupDataChannel(dataChannel);

        pc.onicecandidate = (e) => {
            if (!e.candidate) {
                // Semua pencarian jalur (ICE) selesai, tampilkan kode final
                localOffer.value = btoa(JSON.stringify(pc.localDescription));
                btnCopyOffer.disabled = false;
                appendSystemMessage("Kode Room berhasil dibuat. Berikan kode ini ke teman Anda via Hotspot.");
            }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
    };

    btnCopyOffer.onclick = () => {
        localOffer.select();
        document.execCommand('copy');
        alert('Kode berhasil disalin! Kirimkan ke teman Anda.');
    };

    // 2. Alur USER B (Menerima Penawaran & Membuat Jawaban)
    btnAcceptOffer.onclick = async () => {
        try {
            const rawData = atob(remoteOffer.value.trim());
            const desc = new RTCSessionDescription(JSON.parse(rawData));
            
            if (desc.type === 'offer') {
                pc.ondatachannel = (e) => {
                    dataChannel = e.channel;
                    setupDataChannel(dataChannel);
                };

                await pc.setRemoteDescription(desc);
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        localOffer.value = btoa(JSON.stringify(pc.localDescription));
                        btnCopyOffer.disabled = false;
                        remoteOffer.value = '';
                        appendSystemMessage("Kode balasan dibuat! Salin 'Kode Anda' di atas dan berikan kembali ke User A.");
                    }
                };
            }
        } catch (err) {
            alert('Kode tidak valid! Pastikan Anda menyalin seluruh teks dengan benar.');
        }
    };

    // 3. Alur Akhir USER A (Menempelkan Jawaban dari USER B)
    remoteOffer.oninput = () => {
        try {
            const rawData = atob(remoteOffer.value.trim());
            const desc = new RTCSessionDescription(JSON.parse(rawData));
            if (desc.type === 'answer' && pc.signalingState === 'have-local-offer') {
                btnAcceptOffer.style.display = 'none';
                btnFinalize.style.style = 'block';
                btnFinalize.style.display = 'inline-block';
            }
        } catch(e){}
    };

    btnFinalize.onclick = async () => {
        const rawData = atob(remoteOffer.value.trim());
        const desc = new RTCSessionDescription(JSON.parse(rawData));
        await pc.setRemoteDescription(desc);
        btnFinalize.style.display = 'none';
    };

    // Pengaturan Data Channel (Kirim/Terima Data)
    function setupDataChannel(channel) {
        channel.binaryType = 'arraybuffer';
        
        channel.onopen = () => {
            appendSystemMessage("TERHUBUNG! Anda sekarang bisa berkirim chat dan file.");
            document.getElementById('connectionPanel').style.display = 'none';
            textInput.disabled = false;
            fileInput.disabled = false;
            btnSend.disabled = false;
        };

        channel.onclose = () => {
            appendSystemMessage("Koneksi terputus.");
            textInput.disabled = true;
            fileInput.disabled = true;
            btnSend.disabled = true;
        };

        channel.onmessage = (e) => {
            if (typeof e.data === 'string') {
                // Menangani pesan teks atau metadata file
                const obj = JSON.parse(e.data);
                if (obj.type === 'text') {
                    appendMessage(obj.data, 'remote');
                } else if (obj.type === 'file-start') {
                    incomingFileInfo = obj;
                    receiveBuffer = [];
                    receivedSize = 0;
                    progressContainer.style.display = 'block';
                }
            } else {
                // Menangani chunk data file biner
                receiveBuffer.push(e.data);
                receivedSize += e.data.byteLength;
                
                const percentage = Math.round((receivedSize / incomingFileInfo.size) * 100);
                progressFill.style.width = percentage + '%';
                progressText.innerText = `Menerima ${incomingFileInfo.name}... ${percentage}%`;

                if (receivedSize === incomingFileInfo.size) {
                    const receivedBlob = new Blob(receiveBuffer);
                    const url = URL.createObjectURL(receivedBlob);
                    
                    appendFileLink(incomingFileInfo.name, url);
                    progressContainer.style.display = 'none';
                    incomingFileInfo = null;
                }
            }
        };
    }

    // Fungsi Kirim Pesan Teks
    function sendTextMessage() {
        const text = textInput.value.trim();
        if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
        
        dataChannel.send(JSON.stringify({ type: 'text', data: text }));
        appendMessage(text, 'local');
        textInput.value = '';
    }

    btnSend.onclick = sendTextMessage;
    textInput.onkeypress = (e) => { if (e.key === 'Enter') sendTextMessage(); };

    // Fungsi Kirim File (Dipecah menjadi potongan kecil/Chunks agar tidak crash)
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (!file || !dataChannel || dataChannel.readyState !== 'open') return;

        // Kirim info file terlebih dahulu
        dataChannel.send(JSON.stringify({
            type: 'file-start',
            name: file.name,
            size: file.size
        }));

        progressContainer.style.display = 'block';
        const chunkSize = 16384; // 16KB per chunk agar stabil di hotspot offline
        let offset = 0;

        const fileReader = new FileReader();
        fileReader.onload = (e) => {
            dataChannel.send(e.target.result);
            offset += e.target.result.byteLength;
            
            const percentage = Math.round((offset / file.size) * 100);
            progressFill.style.width = percentage + '%';
            progressText.innerText = `Mengirim ${file.name}... ${percentage}%`;

            if (offset < file.size) {
                readNextChunk();
            } else {
                appendSystemMessage(`File "${file.name}" sukses dikirim.`);
                progressContainer.style.display = 'none';
                fileInput.value = '';
            }
        };

        function readNextChunk() {
            const slice = file.slice(offset, offset + chunkSize);
            fileReader.readAsArrayBuffer(slice);
        }

        readNextChunk();
    };

    // Helper UI
    function appendMessage(text, side) {
        const el = document.createElement('div');
        el.className = `msg ${side}`;
        el.innerText = text;
        messagesBox.appendChild(el);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function appendSystemMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg system';
        el.innerText = text;
        messagesBox.appendChild(el);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function appendFileLink(fileName, url) {
        const el = document.createElement('div');
        el.className = 'msg remote';
        el.innerHTML = `📁 <b>File diterima:</b> <br><a href="${url}" download="${fileName}" style="color: #007bff; font-weight: bold;">Unduh ${fileName}</a>`;
        messagesBox.appendChild(el);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }
</script>
</body>
</html>
